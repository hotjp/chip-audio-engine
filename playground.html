<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip Audio Engine — Playground</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #eaeaea;
      --muted: #a0a0a0;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    .sub { color: var(--muted); margin-bottom: 20px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .panel h2 { margin: 0 0 12px; font-size: 1.1rem; color: #fff; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .row + .row { margin-top: 10px; }
    button {
      background: var(--accent);
      color: var(--text);
      border: 1px solid #1a4a7a;
      border-radius: var(--radius);
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: transform .05s, background .15s;
    }
    button:hover { background: #1a4a7a; }
    button:active { transform: translateY(1px); }
    button.stress { border-color: var(--highlight); }
    button.stress:hover { background: var(--highlight); color: #fff; }
    input[type="range"] { width: 220px; }
    label { color: var(--muted); font-size: 0.9rem; }
    .badge {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: 8px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Chip Audio Engine <span style="color:var(--highlight)">Playground</span></h1>
    <div class="sub">Web Audio API · Oscillator · ADSR · Multi-waveform · Pitch slide</div>

    <div class="panel">
      <h2>Master Controls</h2>
      <div class="row">
        <label for="masterVol">Master Volume</label>
        <input id="masterVol" type="range" min="0" max="1" step="0.01" value="0.8" />
        <span id="masterVolVal" class="badge">0.80</span>
      </div>
      <div class="row">
        <button id="btnMute">Mute</button>
        <button id="btnStopAll">Stop All</button>
        <span id="status" class="badge">Ready</span>
      </div>
    </div>

    <div class="panel">
      <h2>UI Sounds</h2>
      <div class="grid" id="uiGrid"></div>
    </div>

    <div class="panel">
      <h2>Gameplay Sounds</h2>
      <div class="grid" id="gameGrid"></div>
    </div>

    <div class="panel">
      <h2>Stress Test</h2>
      <div class="row">
        <button id="btnRapid" class="stress">Rapid Fire (10× click)</button>
        <button id="btnMulti" class="stress">Multi-Channel (all sounds)</button>
      </div>
    </div>
  </div>

  <script>
    // Inline SoundPack data (pixel-sfc)
    const SOUND_PACK = {
      name: 'pixel-sfc',
      sounds: {
        'ui.click': {
          waveforms: [{ type: 'square', frequency: 800, gain: 0.5 }],
          envelope: { attack: 5, decay: 15, sustain: 0.1, release: 20 },
          duration: 50,
          volume: 0.6
        },
        'ui.hover': {
          waveforms: [{ type: 'sine', frequency: 600, gain: 0.3 }],
          envelope: { attack: 5, decay: 10, sustain: 0, release: 15 },
          duration: 30,
          volume: 0.3
        },
        'ui.tabSwitch': {
          waveforms: [{ type: 'triangle', frequency: 500, gain: 0.5 }],
          envelope: { attack: 5, decay: 30, sustain: 0.2, release: 45 },
          duration: 80,
          pitch: { start: 1.0, end: 1.4 },
          volume: 0.5
        },
        'ui.buttonPress': {
          waveforms: [{ type: 'square', frequency: 400, gain: 0.6 }],
          envelope: { attack: 5, decay: 20, sustain: 0.1, release: 35 },
          duration: 60,
          volume: 0.7
        },
        'ui.alert': {
          waveforms: [{ type: 'sawtooth', frequency: 900, gain: 0.4 }],
          envelope: { attack: 10, decay: 80, sustain: 0.3, release: 110 },
          duration: 200,
          volume: 0.5
        },
        'game.taskComplete': {
          waveforms: [
            { type: 'square', frequency: 600, gain: 0.4 },
            { type: 'sine', frequency: 1200, gain: 0.2 }
          ],
          envelope: { attack: 10, decay: 100, sustain: 0.4, release: 190 },
          duration: 300,
          pitch: { start: 1.0, end: 2.0 },
          volume: 0.7
        },
        'game.taskFail': {
          waveforms: [{ type: 'sawtooth', frequency: 300, gain: 0.5 }],
          envelope: { attack: 15, decay: 100, sustain: 0.2, release: 135 },
          duration: 250,
          pitch: { start: 1.0, end: 0.5 },
          volume: 0.6
        },
        'game.agentSelect': {
          waveforms: [{ type: 'sine', frequency: 880, gain: 0.5 }],
          envelope: { attack: 5, decay: 30, sustain: 0.2, release: 45 },
          duration: 80,
          volume: 0.6
        },
        'game.agentMove': {
          waveforms: [{ type: 'triangle', frequency: 350, gain: 0.5 }],
          envelope: { attack: 10, decay: 40, sustain: 0.2, release: 50 },
          duration: 100,
          pitch: { start: 1.0, end: 1.286 },
          volume: 0.5
        },
        'game.zoneAlert': {
          waveforms: [
            { type: 'square', frequency: 700, gain: 0.4 },
            { type: 'sawtooth', frequency: 703, gain: 0.3 }
          ],
          envelope: { attack: 20, decay: 200, sustain: 0.5, release: 180 },
          duration: 400,
          volume: 0.6
        },
        'game.disconnect': {
          waveforms: [
            { type: 'square', frequency: 200, gain: 0.35 },
            { type: 'triangle', frequency: 198, gain: 0.25 },
            { type: 'sawtooth', frequency: 202, gain: 0.2 }
          ],
          envelope: { attack: 20, decay: 300, sustain: 0.1, release: 180 },
          duration: 500,
          pitch: { start: 1.0, end: 0.5 },
          volume: 0.7
        }
      }
    };

    let ctx = null;
    let masterGain = null;
    let isMuted = false;
    let preMuteVolume = 0.8;
    const activeNodes = [];

    function ensureCtx() {
      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = ctx.createGain();
        masterGain.gain.value = preMuteVolume;
        masterGain.connect(ctx.destination);
      }
      if (ctx.state === 'suspended') {
        ctx.resume();
      }
    }

    function toSeconds(ms) { return ms / 1000; }

    function playSound(soundId) {
      ensureCtx();
      const params = SOUND_PACK.sounds[soundId];
      if (!params) return;

      const t0 = ctx.currentTime;
      const durationMs = params.duration ?? 300;
      const volume = params.volume ?? 1;
      const envelope = params.envelope;
      const pitchCurve = params.pitch;
      const waveforms = params.waveforms ?? [{ type: 'sine', frequency: 440 }];

      const master = ctx.createGain();
      master.gain.value = 0;
      master.connect(masterGain);

      const oscillators = [];
      const waveGains = [];

      for (const wave of waveforms) {
        const osc = ctx.createOscillator();
        osc.type = wave.type;
        const baseFreq = Array.isArray(wave.frequency) ? wave.frequency[0] : wave.frequency;
        osc.frequency.value = baseFreq;
        if (wave.detune !== undefined) osc.detune.value = wave.detune;

        const g = ctx.createGain();
        g.gain.value = wave.gain ?? 1;

        osc.connect(g);
        g.connect(master);

        oscillators.push(osc);
        waveGains.push(g);
      }

      for (let i = 0; i < oscillators.length; i++) {
        const osc = oscillators[i];
        const wave = waveforms[i];
        const baseFreq = Array.isArray(wave.frequency) ? wave.frequency[0] : wave.frequency;

        if (pitchCurve && durationMs !== undefined) {
          const startFreq = baseFreq * pitchCurve.start;
          const endFreq = Math.max(0.01, baseFreq * pitchCurve.end);
          osc.frequency.setValueAtTime(startFreq, t0);
          osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + toSeconds(durationMs));
        } else {
          osc.frequency.setValueAtTime(baseFreq, t0);
        }

        osc.start(t0);
      }

      const gain = master.gain;
      gain.cancelScheduledValues(t0);
      gain.setValueAtTime(0, t0);

      if (envelope) {
        const attack = toSeconds(envelope.attack);
        const decay = toSeconds(envelope.decay);
        const peak = volume;
        const sustain = envelope.sustain * volume;
        gain.linearRampToValueAtTime(peak, t0 + attack);
        gain.linearRampToValueAtTime(sustain, t0 + attack + decay);
      } else {
        gain.linearRampToValueAtTime(volume, t0);
      }

      const releaseMs = envelope?.release ?? 100;
      const releaseEnd = t0 + toSeconds(durationMs) + toSeconds(releaseMs);
      gain.cancelScheduledValues(t0 + toSeconds(durationMs));
      gain.setValueAtTime(gain.value, t0 + toSeconds(durationMs));
      gain.linearRampToValueAtTime(0, releaseEnd);

      for (const osc of oscillators) {
        try { osc.stop(releaseEnd); } catch {}
      }

      const nodeSet = { oscillators, waveGains, master };
      activeNodes.push(nodeSet);

      setTimeout(() => {
        disposeNodeSet(nodeSet);
      }, (durationMs + releaseMs + 50));
    }

    function disposeNodeSet(nodeSet) {
      const idx = activeNodes.indexOf(nodeSet);
      if (idx > -1) activeNodes.splice(idx, 1);
      for (const osc of nodeSet.oscillators) {
        try { osc.stop(); } catch {}
        osc.disconnect();
      }
      for (const g of nodeSet.waveGains) g.disconnect();
      nodeSet.master.disconnect();
    }

    function stopAll() {
      while (activeNodes.length) {
        const nodeSet = activeNodes.pop();
        for (const osc of nodeSet.oscillators) {
          try { osc.stop(ctx ? ctx.currentTime : 0); } catch {}
          osc.disconnect();
        }
        for (const g of nodeSet.waveGains) g.disconnect();
        nodeSet.master.disconnect();
      }
    }

    function setMasterVolume(v) {
      preMuteVolume = v;
      if (masterGain && !isMuted) {
        masterGain.gain.cancelScheduledValues(ctx.currentTime);
        masterGain.gain.setValueAtTime(v, ctx.currentTime);
      }
    }

    function setMuted(v) {
      isMuted = v;
      if (!masterGain) return;
      const now = ctx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      if (v) {
        masterGain.gain.setValueAtTime(0, now);
      } else {
        masterGain.gain.setValueAtTime(preMuteVolume, now);
      }
    }

    // UI bindings
    const uiGrid = document.getElementById('uiGrid');
    const gameGrid = document.getElementById('gameGrid');

    Object.keys(SOUND_PACK.sounds).forEach(id => {
      const btn = document.createElement('button');
      btn.textContent = id.replace(/^ui\.|^game\./, '');
      btn.onclick = () => { playSound(id); updateStatus('Playing ' + id); };
      if (id.startsWith('ui.')) uiGrid.appendChild(btn);
      else gameGrid.appendChild(btn);
    });

    const masterVol = document.getElementById('masterVol');
    const masterVolVal = document.getElementById('masterVolVal');
    masterVol.addEventListener('input', () => {
      const v = parseFloat(masterVol.value);
      masterVolVal.textContent = v.toFixed(2);
      setMasterVolume(v);
    });

    const btnMute = document.getElementById('btnMute');
    btnMute.addEventListener('click', () => {
      setMuted(!isMuted);
      btnMute.textContent = isMuted ? 'Unmute' : 'Mute';
      updateStatus(isMuted ? 'Muted' : 'Unmuted');
    });

    const btnStopAll = document.getElementById('btnStopAll');
    btnStopAll.addEventListener('click', () => {
      stopAll();
      updateStatus('Stopped all');
    });

    const statusEl = document.getElementById('status');
    function updateStatus(msg) {
      statusEl.textContent = msg;
      clearTimeout(statusEl._t);
      statusEl._t = setTimeout(() => { statusEl.textContent = 'Ready'; }, 1200);
    }

    document.getElementById('btnRapid').addEventListener('click', () => {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => playSound('ui.click'), i * 40);
      }
      updateStatus('Rapid fire 10×');
    });

    document.getElementById('btnMulti').addEventListener('click', () => {
      const ids = Object.keys(SOUND_PACK.sounds);
      ids.forEach((id, i) => {
        setTimeout(() => playSound(id), i * 60);
      });
      updateStatus('Multi-channel (' + ids.length + ' sounds)');
    });
  </script>
</body>
</html>
